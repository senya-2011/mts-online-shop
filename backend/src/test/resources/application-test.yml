spring:
  jta:
    enabled: true
    transaction-manager-id: narayana-transaction-manager
    allow-custom-isolation-levels: true
    default-transaction-timeout: 300
    narayana:
      log-dir: ./target/test-tx-object-store
      node-identifier: mts-online-shop-test
      periodic-recovery-period: 60
      recovery-backoff-period: 5
      status-port: 4714
      socket-process-id-port: 4715
      socket-process-id-max-ports: 5
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb
    username: sa
    password: ""
  h2:
    console:
      enabled: true
  liquibase:
    enabled: false

logging:
  level:
    com.arjuna: DEBUG
    com.mts.online_shop: DEBUG
    org.springframework.transaction: DEBUG
