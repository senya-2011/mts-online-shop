spring:
  jta:
    atomikos:
      datasource:
        xa-data-source-class-name: org.postgresql.xa.PGXADataSource
        xa-properties:
          url: jdbc:h2:mem:testdb
          user: sa
          password: ""
      connectionfactory:
        xa-properties:
          com.atomikos.icatch.serial_jta_transactions: false
          com.atomikos.icatch.force_shutdown: true
          com.atomikos.icatch.default_jta_timeout: 300000
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb
    username: sa
    password: ""
  h2:
    console:
      enabled: true
  liquibase:
    enabled: false

logging:
  level:
    com.atomikos: DEBUG
    com.mts.online_shop: DEBUG
    org.springframework.transaction: DEBUG
