spring:
  application:
    name: ${MTS_APP_NAME:online-shop}
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  liquibase:
    enabled: ${MTS_LIQUIBASE_ENABLED:true}
    change-log: classpath:db/changelog/db.changelog-master.yml
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${MTS_DB_HOST:localhost}:${MTS_DB_PORT:5432}/${MTS_DB_NAME:db_backend}
    username: ${MTS_DB_USERNAME:postgres}
    password: ${MTS_DB_PASSWORD:postgres}

  mail:
    host: ${MTS_MAIL_HOST:smtp.mail.ru}
    port: ${MTS_MAIL_PORT:465}
    username: ${MTS_MAIL_USERNAME:noreply@localhost}
    password: ${MTS_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false

server:
  port: ${MTS_PORT:8080}
  servlet:
    context-path: ${MTS_CONTEXT_PATH:}

jwt:
  secret: ${MTS_JWT_SECRET:s9/PnuqMovO16uMBoWSjwoWI8etyn1KLFvfCLyTXq+g=}
  expiration-ms: ${MTS_JWT_EXPIRATION_MS:1800000}

bank:
  base-url: ${BANK_URL:http://localhost:8081}

app:
  mqtt:
    broker-uri: ${MQTT_BROKER_URI:tcp://localhost:1883}
    client-id-prefix: ${MQTT_CLIENT_ID_PREFIX:online-shop}
    topic: ${MQTT_TELEGRAM_TOPIC:mts/shop/telegram/notify}
  bank:
    health-check-ms: ${BANK_HEALTH_CHECK_MS:300000}

logging:
  level:
    root: ${MTS_LOG_LEVEL:INFO}
    liquibase: INFO
    org.springframework.boot.autoconfigure.liquibase: INFO

# Paths are relative to server root; context-path (e.g. /api) is applied by Spring — do not prefix with /api again.
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

mail:
  from: ${MTS_MAIL_USERNAME:noreply@localhost}