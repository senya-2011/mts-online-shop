spring:
  application:
    name: online-shop
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:pass}
  mail:
    host: ${MAIL_HOST:smtp.mail.ru}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:noreply@localhost}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: false

server:
  port: ${MY_PORT:8080}
  servlet:
    context-path: /api
jwt:
  secret: ${JWT_SECRET:s9/PnuqMovO16uMBoWSjwoWI8etyn1KLFvfCLyTXq+g=}
  expiration-ms: ${JWT_EXPIRATION_MS:1800000}

logging:
  level:
    root: INFO
    liquibase: INFO
    org.springframework.boot.autoconfigure.liquibase: INFO

mail:
  from: ${MAIL_USERNAME:noreply@localhost}