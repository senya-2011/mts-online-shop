spring:
  application:
    name: ${BANK_APP_NAME:bank-simulator}
  liquibase:
    # enabled: ${BANK_LIQUIBASE_ENABLED:true}
    enabled: false
    change-log: classpath:db/changelog/db.changelog-master.yml
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${BANK_DB_URL:jdbc:postgresql://${BANK_DB_HOST:localhost}:${BANK_DB_PORT:13300}/${BANK_DB_NAME:db}}
    username: ${BANK_DB_USERNAME:user}
    password: ${BANK_DB_PASSWORD:pass}

server:
  port: ${BANK_PORT:8081}
  servlet:
    context-path: ${BANK_CONTEXT_PATH:/api}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: ${BANK_LOG_LEVEL:INFO}
    liquibase: INFO
    org.springframework.boot.autoconfigure.liquibase: INFO
