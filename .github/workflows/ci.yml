name: CI Pipeline

on:
  push:
    branches: [dev, main, 'feat/**', 'fix/**']
  pull_request:
    branches: [ dev, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Run tests 
        run: ./gradlew test
        working-directory: backend
