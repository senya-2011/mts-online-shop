# Что вставить в секрет HELIOS_ENV — см. docs/HELIOS_ENV.md
name: Helios Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_USER: ${{ secrets.HELIOS_USERNAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build backend (online-shop)
        working-directory: backend
        run: chmod +x gradlew && ./gradlew clean bootJar -x test

      - name: Build bank
        working-directory: bank
        run: chmod +x gradlew && ./gradlew clean bootJar -x test

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HELIOS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa

      - name: Trust helios host key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p 2222 helios.cs.ifmo.ru >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Create MTS directory and upload .env
        run: |
          ssh -p 2222 ${{ secrets.HELIOS_USERNAME }}@helios.cs.ifmo.ru 'mkdir -p ~/MTS'
          if [ -n "${{ secrets.HELIOS_ENV }}" ]; then
            echo "${{ secrets.HELIOS_ENV }}" | ssh -p 2222 ${{ secrets.HELIOS_USERNAME }}@helios.cs.ifmo.ru 'cat > ~/MTS/.env'
          fi

      - name: Upload jars and deploy
        run: |
          scp -P 2222 backend/build/libs/online-shop-0.0.1-SNAPSHOT.jar ${{ secrets.HELIOS_USERNAME }}@helios.cs.ifmo.ru:~/MTS/online-shop.jar
          scp -P 2222 bank/build/libs/bank-simulator-0.0.1-SNAPSHOT.jar ${{ secrets.HELIOS_USERNAME }}@helios.cs.ifmo.ru:~/MTS/bank-simulator.jar
          ssh -p 2222 ${{ secrets.HELIOS_USERNAME }}@helios.cs.ifmo.ru 'cd ~/MTS && set -a && [ -f .env ] && . ./.env; set +a && export MTS_PORT=13228 BANK_PORT=13229 BANK_URL=http://localhost:13229 && pkill -f online-shop.jar || true; pkill -f bank-simulator.jar || true; sleep 2 && nohup java -jar bank-simulator.jar > bank-simulator.log 2>&1 & sleep 2 && nohup java -jar online-shop.jar > online-shop.log 2>&1 & echo "Deployment completed"'

      - name: Verify deployment
        run: |
          sleep 10
          curl -sf http://helios.cs.ifmo.ru:13229/api/cards > /dev/null && echo "Bank OK" || echo "Bank might still be starting"
          curl -sf http://helios.cs.ifmo.ru:13228/api/products > /dev/null && echo "Backend OK" || echo "Backend might still be starting"