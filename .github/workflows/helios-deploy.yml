name: Helios Deploy

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build backend
        working-directory: backend
        run: chmod +x gradlew && ./gradlew clean bootJar -x test

      - name: Build bank
        working-directory: bank
        run: chmod +x gradlew && ./gradlew clean bootJar -x test

      - name: Setup SSH and deploy
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.HELIOS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval "$(ssh-agent -s)" && ssh-add ~/.ssh/id_rsa
          ssh-keyscan -p 2222 helios.cs.ifmo.ru >> ~/.ssh/known_hosts 2>/dev/null

          ssh -p 2222 ${{ secrets.HELIOS_USERNAME }}@helios.cs.ifmo.ru 'mkdir -p ~/MTS'
          if [ -n "${{ secrets.HELIOS_ENV }}" ]; then
            echo "${{ secrets.HELIOS_ENV }}" | ssh -p 2222 ${{ secrets.HELIOS_USERNAME }}@helios.cs.ifmo.ru 'cat > ~/MTS/.env'
          fi

          scp -P 2222 backend/build/libs/online-shop-0.0.1-SNAPSHOT.jar ${{ secrets.HELIOS_USERNAME }}@helios.cs.ifmo.ru:~/MTS/online-shop.jar
          scp -P 2222 bank/build/libs/bank-simulator-0.0.1-SNAPSHOT.jar ${{ secrets.HELIOS_USERNAME }}@helios.cs.ifmo.ru:~/MTS/bank-simulator.jar

          ssh -p 2222 ${{ secrets.HELIOS_USERNAME }}@helios.cs.ifmo.ru "cd ~/MTS && set -a && [ -f .env ] && . ./.env; set +a && export MTS_PORT=13228 BANK_PORT=13229 BANK_URL=http://localhost:13229; pkill -f online-shop.jar || true; pkill -f bank-simulator.jar || true; sleep 2; nohup java -Xmx512m -Xms256m -jar bank-simulator.jar > bank-simulator.log 2>&1 & disown; sleep 2; nohup java -Xmx512m -Xms256m -jar online-shop.jar > online-shop.log 2>&1 & disown; echo Done"

      - name: Verify
        run: |
          sleep 10
          curl -sf http://helios.cs.ifmo.ru:13229/api/cards >/dev/null && echo "Bank OK" || echo "Bank not ready"
          curl -sf http://helios.cs.ifmo.ru:13228/api/products >/dev/null && echo "Backend OK" || echo "Backend not ready"